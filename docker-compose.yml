services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - kafka_network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_MS: "600000"
      KAFKA_LOG_RETENTION_BYTES: "1000000000"
      KAFKA_LOG_SEGMENT_BYTES: "100000000"
    networks:
      - kafka_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: always
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local-cluster"
      KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_ZOOKEEPER: "zookeeper:2181"
      KAFKA_CLUSTERS_0_KAFKA_VERSION: "2.7.0"
    networks:
      - kafka_network

  influxdb:
    image: influxdb:latest
    container_name: influxdb
    environment:
      INFLUXDB_DB: mydb
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: adminpassword
      INFLUXDB_USER: user
      INFLUXDB_USER_PASSWORD: userpassword
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
    restart: unless-stopped
    networks:
      - kafka_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: adminpassword
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - kafka_network

  superset:
    build:
      context: . 
      dockerfile: docker/Dockerfile.superset 
    image: athena_superset
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      ATHENA_DB: ${ATHENA_DB}
      S3_STAGING_DIR: ${S3_STAGING_DIR}
      SUPERSET_DATABASE_URI: "awsathena+rest://${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}@athena.${AWS_DEFAULT_REGION}.amazonaws.com/${ATHENA_DB}?s3_staging_dir=${S3_STAGING_DIR}"
      # Đường dẫn tuyệt đối BÊN TRONG container nơi file config được COPY hoặc mount tới
      # Giả sử Dockerfile.superset sẽ COPY file config vào /app/superset_config.py
      SUPERSET_CONFIG_PATH: /app/superset_config.py
    volumes:
      - superset_home:/app/superset_home
      # Mount file config từ host vào cùng vị trí mà SUPERSET_CONFIG_PATH trỏ tới
      # Điều này hữu ích cho development để thay đổi config mà không cần build lại image
      - ./core/streaming/superset/config.py:/app/superset_config.py
    command: ["/bin/sh", "-c",
      "superset db upgrade &&
      superset fab create-admin --username ${SUPERSET_USERNAME} --firstname Superset --lastname Admin --email admin@superset.local --password ${SUPERSET_PASSWORD} &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088"
    ]
    restart: unless-stopped
    networks:
      - kafka_network

  dwh_stock_service: 
    container_name: dwh_stock_service
    build:
      context: . 
      dockerfile: Dockerfile
    image: dwh_stock_service
    volumes:
      - ./core:/DWH-STOCK/core 
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped
    networks:
      - kafka_network

volumes:
  influxdb_data:
  grafana_data:
  superset_home:

networks:
  kafka_network:
    driver: bridge
