services:
  DWH-STOCK:
    container_name: dwh_stock_service 
    build:
      context: .
      dockerfile: Dockerfile
    image: dwh_stock_service
    volumes:
      - ./core:/DWH-STOCK/core
    ports: 
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped 
    networks:
      - kafka_network
networks:
  kafka_network:
    external: true
    name: dwh-stock-bigdata_kafka_network